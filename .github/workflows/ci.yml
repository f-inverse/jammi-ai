name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (hermetic)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Compile-check live tests
        run: cargo test --workspace --features live-hub-tests --no-run

      - name: Run tests
        run: cargo test --workspace

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Rustdoc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Build guide
        run: mdbook build docs/guide

[package]
name = "jammi-server"
description = "Arrow Flight SQL server and health probe for Jammi AI"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

[dependencies]
jammi-ai = { workspace = true, optional = true }
axum.workspace = true
datafusion.workspace = true
datafusion-flight-sql-server.workspace = true
tonic.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[features]
cuda  = ["dep:jammi-ai", "jammi-ai/cuda"]
metal = ["dep:jammi-ai", "jammi-ai/metal"]

[dev-dependencies]
jammi-engine.workspace = true
tokio.workspace = true
tower = { workspace = true, features = ["util"] }
reqwest.workspace = true

        with:
          path: /opt/minio-bin
          key: minio-${{ env.MINIO_RELEASE }}-mc-${{ env.MC_RELEASE }}

      - name: Download the pinned MinIO + mc binaries (cache miss)
        if: steps.minio-cache.outputs.cache-hit != 'true'
        # Pull the exact pinned versions from the immutable `archive/` path. On a
        # cache hit this step is skipped entirely, so a `dl.min.io` outage on a
        # re-run cannot red the lane.
        run: |
          mkdir -p /opt/minio-bin
          curl -fsSL "https://dl.min.io/server/minio/release/linux-amd64/archive/minio.${MINIO_RELEASE}" -o /opt/minio-bin/minio

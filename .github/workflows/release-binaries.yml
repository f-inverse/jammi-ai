name: Release Binaries

# Publishes prebuilt CPU `jammi` CLI binaries for direct download. Triggered on
# every `v*` tag (the workspace's release tagging scheme), alongside the
# crates.io publish (`crates.yml`) and the server image build (`server-image.yml`).
# This is an independent job set: a failure here cannot wedge the crates.io
# publish, and vice versa.
#
# These are CPU binaries (default features — no CUDA). GPU ships via the
# `jammi-ai-server-cu12` container image (`server-image.yml`), not as a bare
# binary, so there is deliberately no CUDA asset here.
#
# `workflow_dispatch` makes the build safely exercisable on a branch without
# cutting a release: on dispatch the binaries are uploaded as workflow
# artifacts only; the `gh release upload` step runs solely on a tag push.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux_2_28 glibc floor for portability — built inside the CI
          # base image (the same toolchain layer the crates.io publish uses),
          # so the binary links against glibc 2.28 and runs on any newer host.
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: ghcr.io/f-inverse/jammi-ai-ci:latest
          # Apple-silicon native build. mold is Linux-only and auto-skips here.
          - target: aarch64-apple-darwin
            runs-on: macos-14
            container: ""
          # linux-aarch64 is deferred: there is no arm Linux runner and no
          # multi-arch CI base image to build it portably. Add a target row
          # here once an arm runner / arm CI base is available.

    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.9

      # The Linux build runs in the CI container, which already carries the
      # Rust toolchain, protoc, and mold. The macOS runner needs protoc and a
      # Rust toolchain installed natively.
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build jammi (CPU, release)
        run: cargo build --release -p jammi-cli --bin jammi

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          asset="jammi-${version}-${{ matrix.target }}.tar.gz"
          strip target/release/jammi
          tar -C target/release -czf "$asset" jammi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      # On a tag push, attach the asset to the GitHub release (created by the
      # `github-release` job in `crates.yml`). `gh release upload --clobber`
      # is idempotent on re-run.
      - name: Upload to release (tag push)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "${{ steps.package.outputs.asset }}" --clobber

      # On a manual dispatch (branch exercise), publish the built artifact to the
      # workflow run instead — no release is touched.
      - name: Upload artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}

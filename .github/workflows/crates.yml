name: Crates

on:
  push:
    tags: ["v*"]
  # Manual re-run to finish a release whose publish step was interrupted (e.g. a
  # runner ran out of disk mid-publish). Pass the version to (re)publish; the
  # per-crate "already on crates.io" guard skips whatever already landed.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to (re)publish, e.g. 0.13.0. Defaults to the pushed tag."
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify tag matches workspace version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match workspace version $version"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # `jammi-python` is built via maturin, not workspace cargo — its
      # `extension-module` feature is opt-in so the bare workspace test
      # lane would fail to link `-lpython3.x` on the manylinux CI image.
      # The crate is exercised end-to-end by the `Test (Python)` job in
      # `ci.yml` (which also runs `cargo test -p jammi-python` against
      # the venv's interpreter).
      - name: Run tests
        run: cargo test --workspace --exclude jammi-python

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          # On a tag push, derive the version from the tag (v0.13.0 -> 0.13.0);
          # on a manual dispatch, take it from the input.
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION:-${GITHUB_REF_NAME#v}}"
          # Publish in topological dependency order. Each entry must come
          # after every crate it depends on, since `cargo publish` resolves
          # workspace deps against crates.io once the path = is stripped:
          #   - jammi-numerics is leaf (no internal deps)
          #   - jammi-db depends on jammi-numerics
          #   - jammi-lora is leaf
          #   - jammi-encoders depends on jammi-lora
          #   - jammi-ai depends on jammi-db, jammi-numerics, jammi-lora, jammi-encoders
          #   - jammi-server depends on jammi-db, jammi-ai
          #   - jammi-cli depends on jammi-db, jammi-ai, jammi-server
          # The presence guard skips crates that don't exist at this tag's
          # checkout — pre-S2 tags don't have jammi-numerics.
          for crate in jammi-numerics jammi-db jammi-lora jammi-encoders jammi-ai jammi-server jammi-cli; do
            if [ ! -f "crates/${crate}/Cargo.toml" ]; then
              echo "${crate} not present at this tag — skipping"
              continue
            fi
            if curl -sf "https://crates.io/api/v1/crates/${crate}/${VERSION}" >/dev/null; then
              echo "${crate} ${VERSION} already on crates.io — skipping"
            else
              echo "Publishing ${crate} ${VERSION}"
              # --no-verify: the `validate` job above already compiled and tested
              # the whole workspace, so cargo's per-crate pre-publish recompile is
              # redundant — and recompiling the full arrow/candle/datafusion tree
              # once per crate overflows the runner's disk on the last crate.
              cargo publish -p "${crate}" --no-verify
              echo "Waiting 30s for crates.io index..."
              sleep 30
            fi
          done

  github-release:
    name: GitHub Release
    needs: publish
    # Only on a tag push — a manual dispatch (used to finish an interrupted
    # publish) has no tag ref to create a release from.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes

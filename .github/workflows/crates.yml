name: Crates

on:
  push:
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match workspace version $version"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish jammi-engine
        run: cargo publish -p jammi-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish jammi-ai
        run: cargo publish -p jammi-ai
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish jammi-server
        run: cargo publish -p jammi-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish jammi-cli
        run: cargo publish -p jammi-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes

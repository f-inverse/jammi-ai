[package]
name = "jammi-ai"
description = "Embeddable AI engine for inference, embeddings, vector search, and fine-tuning"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

[dependencies]
jammi-db.workspace = true
jammi-numerics.workspace = true
jammi-lora.workspace = true
jammi-encoders.workspace = true
candle-core.workspace = true
candle-nn.workspace = true
hf-hub.workspace = true
tokenizers.workspace = true
datafusion.workspace = true
arrow.workspace = true
arrow-schema.workspace = true
arrow-array.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tokio.workspace = true
thiserror.workspace = true
uuid.workspace = true
chrono.workspace = true

# Image processing
image.workspace = true

# Audio decode/demux for the audio-embedding path (bytes-in: WAV/FLAC/MP3/Ogg)
symphonia.workspace = true

# Gzip decompression for OpenCLIP BPE vocab (bpe_simple_vocab_16e6.txt.gz)
flate2.workspace = true

# HTTP backend
reqwest.workspace = true

# gRPC wire surface (default-off `wire` feature). These pull the transport
# stack only when a consumer that speaks gRPC — `jammi-server`, a future
# `RemoteSession` — opts in; a default / embedded / PyO3 build pulls none of
# them, keeping the embeddable engine tonic/prost-free.
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
prost-types = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }
arrow-ipc = { workspace = true, optional = true }

[build-dependencies]
# Built only under the `wire` feature; `build.rs` returns early without
# `CARGO_FEATURE_WIRE`, so a default build neither links nor runs these.
tonic-build = { workspace = true, optional = true }
tonic-prost-build = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3"
tokio.workspace = true
parquet.workspace = true
wiremock = "0.6"
serial_test = "3"
jammi-test-utils.workspace = true

[features]
live-hub-tests = []
cuda = ["candle-core/cuda", "candle-nn/cuda"]
metal = ["candle-core/metal", "candle-nn/metal"]
# The gRPC wire surface: generated tonic stubs (build.rs codegen) plus the
# proto↔domain conversions in `src/wire`. Default-off so the embeddable engine
# pulls no transport stack; `jammi-server` and a future `RemoteSession` enable
# it. Pulls the tonic/prost runtime deps and the tonic build-deps that drive
# `build.rs`.
wire = [
    "dep:tonic",
    "dep:tonic-prost",
    "dep:prost",
    "dep:prost-types",
    "dep:tokio-stream",
    "dep:arrow-ipc",
    "dep:tonic-build",
    "dep:tonic-prost-build",
]

syntax = "proto3";

package jammi.v1.mutable_table;

import "google/protobuf/empty.proto";

// MutableTableService ŌĆö the wire surface for the engine's mutable-companion-
// table lifecycle verbs.
//
// `CreateMutableTable` and `DropMutableTable` are imperative session methods,
// not SQL queries, so they live as typed gRPC RPCs alongside SessionService /
// TriggerService / EmbeddingService / ŌĆ” rather than on the Flight SQL surface.
// Per ADR-01 ┬¦3.2 Flight SQL carries query/result only ŌĆö so *reading* or
// *querying* a mutable table is plain Flight SQL and gets no verb here; only
// the imperative create/drop lifecycle does.
//
// Each verb delegates 1:1 to the consumer-facing `Session`/`LocalSession`
// abstraction; the service reimplements no DDL, storage, or catalog logic. The
// request message mirrors the Rust `MutableTableDefinition` field for field.
//
// Tenant scope is read from the request's `SessionTenant` extension (set by the
// shared TenantInterceptor from the `jammi-session-id` header) ŌĆö the same
// mechanism every other gRPC service and Flight SQL already use. The definition
// body carries no tenant field; the engine stamps the session's tenant onto the
// catalog row.
service MutableTableService {
  // Register a mutable companion table. After this returns the table is
  // queryable through Flight SQL. Peer of the abstraction's
  // `create_mutable_table`.
  rpc CreateMutableTable(CreateMutableTableRequest) returns (CreateMutableTableResponse);

  // Drop a mutable companion table. Peer of the abstraction's
  // `drop_mutable_table`.
  rpc DropMutableTable(DropMutableTableRequest) returns (google.protobuf.Empty);
}

// One secondary-index declaration. Mirrors the engine's `MutableIndexDef`.
message MutableIndex {
  string name = 1;
  repeated string columns = 2;
  bool unique = 3;
}

// Registration descriptor for one mutable companion table. Mirrors the Rust
// `MutableTableDefinition` (minus `tenant`, which the engine stamps from the
// session scope ŌĆö the wire body stays tenant-free).
message MutableTableDefinition {
  // Catalog-unique id: lowercase ASCII letters, digits, and `_`, length 1..=63.
  string id = 1;
  // Arrow schema for the table, encoded as an Arrow IPC schema message (the
  // same self-describing IPC framing TriggerService uses for batch payloads).
  bytes schema = 2;
  // Column(s) forming the primary key. A non-empty subset of the schema.
  repeated string primary_key = 3;
  // Secondary indexes; one CREATE INDEX per entry.
  repeated MutableIndex indexes = 4;
  // Optional monotonic ordering column for streaming reads (`scan_after`).
  // Empty == none.
  string order_column = 5;
  // Chunk size for streaming reads. 0 == the engine default (8192).
  uint64 chunk_size = 6;
  // Free-form tenant-owned metadata as a JSON object string; "{}" when none.
  // The engine stores it verbatim and never parses it.
  string user_metadata = 7;
}

message CreateMutableTableRequest {
  MutableTableDefinition definition = 1;
}

message CreateMutableTableResponse {
  // The id the table was registered under (echoes the validated request id).
  string mutable_table_id = 1;
}

message DropMutableTableRequest {
  string mutable_table_id = 1;
}

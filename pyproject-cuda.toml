[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "jammi-ai-cu12"
requires-python = ">=3.9"
dynamic = ["version"]
description = "Embeddable AI engine for inference, embeddings, vector search, and fine-tuning (CUDA 12)"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "F-Inverse" }]
keywords = ["embeddings", "vector-search", "fine-tuning", "inference", "machine-learning", "cuda", "gpu"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Database",
]

[project.urls]
Homepage = "https://github.com/f-inverse/jammi-ai"
Documentation = "https://f-inverse.github.io/jammi-ai/"
Repository = "https://github.com/f-inverse/jammi-ai"
"Bug Tracker" = "https://github.com/f-inverse/jammi-ai/issues"

[tool.maturin]
manifest-path = "crates/jammi-python/Cargo.toml"
module-name = "jammi._native"
python-source = "python"
features = ["cuda"]

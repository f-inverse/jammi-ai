name: Release Binaries

# Publishes prebuilt binaries for direct download. Triggered on every `v*` tag
# (the workspace's release tagging scheme), alongside the crates.io publish
# (`crates.yml`) and the server image build (`server-image.yml`). This is an
# independent job set: a failure here cannot wedge the crates.io publish, and vice
# versa.
#
# Three asset families ship:
#   - the CPU `jammi` CLI (the `build` matrix: x86_64-linux + aarch64-darwin),
#   - the CPU `jammi-server` tarball (`server-cpu`, x86_64-linux), and
#   - the CUDA `jammi-server` tarball (`server-cu12`, x86_64-linux) — the binary
#     plus the CUDA runtime `.so`s it links and an `LD_LIBRARY_PATH` launcher,
#     so it runs on any host with an NVIDIA driver and no system CUDA install.
# The same GPU build also ships as the `jammi-ai-server-cu12` container image
# (`server-image.yml`) and the `jammi-server-cu12` PyPI wheel (`pypi-server-cuda.yml`).
#
# `workflow_dispatch` makes every job safely exercisable on a branch without
# cutting a release: on dispatch the assets are uploaded as workflow artifacts
# only; the `gh release upload` step runs solely on a tag push.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux_2_28 glibc floor for portability — built inside the CI
          # base image (the same toolchain layer the crates.io publish uses),
          # so the binary links against glibc 2.28 and runs on any newer host.
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: ghcr.io/f-inverse/jammi-ai-ci:latest
          # Apple-silicon native build. mold is Linux-only and auto-skips here.
          - target: aarch64-apple-darwin
            runs-on: macos-14
            container: ""
          # linux-aarch64 is deferred: there is no arm Linux runner and no
          # multi-arch CI base image to build it portably. Add a target row
          # here once an arm runner / arm CI base is available.

    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.9

      # The Linux build runs in the CI container, which already carries the
      # Rust toolchain, protoc, and mold. The macOS runner needs protoc and a
      # Rust toolchain installed natively.
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build jammi (CPU, release)
        run: cargo build --release -p jammi-cli --bin jammi

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          asset="jammi-${version}-${{ matrix.target }}.tar.gz"
          strip target/release/jammi
          tar -C target/release -czf "$asset" jammi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      # On a tag push, attach the asset to the GitHub release (created by the
      # `github-release` job in `crates.yml`). `gh release upload --clobber`
      # is idempotent on re-run.
      - name: Upload to release (tag push)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Linux/server jobs run in the manylinux CI container, which has no
          # `gh` CLI; install it on demand (no-op on the native macOS runner).
          if ! command -v gh >/dev/null 2>&1; then
            GH_VER=2.63.2
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VER}/gh_${GH_VER}_linux_amd64.tar.gz" | tar -xz -C /tmp
            install "/tmp/gh_${GH_VER}_linux_amd64/bin/gh" /usr/local/bin/gh
          fi
          gh release upload "$GITHUB_REF_NAME" "${{ steps.package.outputs.asset }}" --clobber

      # On a manual dispatch (branch exercise), publish the built artifact to the
      # workflow run instead — no release is touched.
      - name: Upload artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}

  # ---- CPU jammi-server tarball ----
  # Mirrors the CPU `jammi` CLI job above: x86_64-linux, built in the CI base
  # image (glibc 2.28 floor), with the broker + cloud-storage features that match
  # the published server image and PyPI wheel.
  server-cpu:
    name: Build jammi-server (CPU)
    runs-on: ubuntu-latest
    container: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build jammi-server (CPU, release)
        run: cargo build --release -p jammi-server --bin jammi-server --features jetstream-broker,storage-cloud

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          asset="jammi-server-${version}-x86_64-unknown-linux-gnu.tar.gz"
          strip target/release/jammi-server
          tar -C target/release -czf "$asset" jammi-server
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload to release (tag push)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Linux/server jobs run in the manylinux CI container, which has no
          # `gh` CLI; install it on demand (no-op on the native macOS runner).
          if ! command -v gh >/dev/null 2>&1; then
            GH_VER=2.63.2
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VER}/gh_${GH_VER}_linux_amd64.tar.gz" | tar -xz -C /tmp
            install "/tmp/gh_${GH_VER}_linux_amd64/bin/gh" /usr/local/bin/gh
          fi
          gh release upload "$GITHUB_REF_NAME" "${{ steps.package.outputs.asset }}" --clobber

      - name: Upload artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}

  # ---- CUDA jammi-server tarball ----
  # Built in the CUDA CI base image (CUDA 12.6 toolkit). The tarball is
  # self-sufficient: it bundles the CUDA-enabled binary, the CUDA runtime `.so`s
  # the binary links dynamically (libcudart / libcublas / libcublasLt / libcurand
  # / libnvrtc), and a `jammi-server` launcher that prepends the bundled `lib/`
  # to LD_LIBRARY_PATH then execs the binary. The candle/cudarc binary has hard
  # DT_NEEDED entries for those libraries, so it will not exec without them on the
  # loader path; bundling makes the tarball run on any host with only an NVIDIA
  # driver. A GPU-less runner is fine — nothing runs the binary here.
  server-cu12:
    name: Build jammi-server (CUDA)
    runs-on: ubuntu-latest
    container: ghcr.io/f-inverse/jammi-ai-ci-cuda:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build jammi-server (CUDA, release)
        run: cargo build --release -p jammi-server --bin jammi-server --features cuda,jetstream-broker,storage-cloud

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          asset="jammi-server-cu12-${version}-x86_64-unknown-linux-gnu.tar.gz"

          stage="jammi-server-cu12"
          mkdir -p "${stage}/lib"
          strip target/release/jammi-server
          cp target/release/jammi-server "${stage}/bin-jammi-server"

          # Source the exact CUDA runtime `.so`s the binary links from the
          # toolkit baked into the CUDA CI base (CUDA 12.6 lives at
          # /usr/local/cuda-12.6/lib64). Copy the SONAME-versioned files so the
          # binary's DT_NEEDED entries resolve. `cp -L` follows the dev symlinks
          # to the real versioned object.
          cuda_lib="/usr/local/cuda-12.6/lib64"
          for soname in libcudart libcublas libcublasLt libcurand libnvrtc libnvrtc-builtins; do
            # Grab every matching versioned object (e.g. libcudart.so.12,
            # libcudart.so.12.6.x) so the loader finds the SONAME it wants.
            for so in "${cuda_lib}/${soname}.so".*; do
              [ -e "$so" ] && cp -L "$so" "${stage}/lib/"
            done
          done

          # The launcher: a host with only an NVIDIA driver has no system CUDA,
          # so put the bundled libs on the loader path before exec. `exec`
          # replaces the shell so signals and the exit code pass through.
          cat > "${stage}/jammi-server" <<'LAUNCH'
          #!/usr/bin/env bash
          set -euo pipefail
          here="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="${here}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          exec "${here}/bin-jammi-server" "$@"
          LAUNCH
          chmod +x "${stage}/jammi-server"

          tar -czf "$asset" "$stage"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload to release (tag push)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Linux/server jobs run in the manylinux CI container, which has no
          # `gh` CLI; install it on demand (no-op on the native macOS runner).
          if ! command -v gh >/dev/null 2>&1; then
            GH_VER=2.63.2
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VER}/gh_${GH_VER}_linux_amd64.tar.gz" | tar -xz -C /tmp
            install "/tmp/gh_${GH_VER}_linux_amd64/bin/gh" /usr/local/bin/gh
          fi
          gh release upload "$GITHUB_REF_NAME" "${{ steps.package.outputs.asset }}" --clobber

      - name: Upload artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}

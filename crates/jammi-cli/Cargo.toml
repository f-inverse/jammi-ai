[package]
name = "jammi-cli"
description = "Command-line interface for Jammi AI"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

# The crate is `jammi-cli`, but the shipped binary is `jammi` — that's the
# command users invoke and what the cookbook recipes / docs / smoke tests
# expect at `target/<profile>/jammi`.
[[bin]]
name = "jammi"
path = "src/main.rs"

[dependencies]
jammi-db.workspace = true
jammi-ai.workspace = true
jammi-server.workspace = true
arrow.workspace = true
arrow-schema.workspace = true
chrono.workspace = true
clap.workspace = true
datafusion.workspace = true
futures.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true

[features]
cuda  = ["jammi-ai/cuda"]
metal = ["jammi-ai/metal"]

# docs.rs builds with default features only. Pin the feature set to empty so a
# future `default` change can never make the docs.rs builder invoke nvcc (the
# `cuda` feature pulls candle's CUDA backend, which needs a CUDA toolchain
# docs.rs does not provide).
[package.metadata.docs.rs]
features = []

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

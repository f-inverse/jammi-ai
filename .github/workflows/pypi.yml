name: PyPI

on:
  push:
    tags: ["py-v*"]
  # Manual re-run to finish a release whose embed-wheel publish was interrupted.
  # The wheel version comes from the checked-out source (maturin reads
  # Cargo.toml), so dispatch from the release commit / `main` at the release
  # version; PyPI rejects a re-upload of an existing version, so this is safe.
  workflow_dispatch:

jobs:
  build-linux:
    name: Build wheel (Linux)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build wheel
        run: maturin build --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist

  build-macos:
    name: Build wheel (macOS ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: wheels-macos-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact: wheels-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The embed wheel depends on `jammi-wire`, whose `build.rs` compiles the
      # `jammi.v1` protos with `protoc` on every build (it is the proto/stub
      # owner). The Linux leg gets `protoc` from the CI base image; the macOS
      # runners do not ship it, so install it here. (The remote arm is still the
      # pure-Python `jammi-client`, published in lockstep by pypi-client.yml.)
      - name: Install protoc (macOS)
        run: brew install protobuf

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
        env:
          RUSTC_WRAPPER: ""

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

  # Windows wheel disabled: usearch 2.24.0 uses POSIX mmap APIs
  # (MAP_FAILED) that MSVC does not support.

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

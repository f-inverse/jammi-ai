[package]
name = "jammi-server"
description = "Arrow Flight SQL server and health probe for Jammi AI"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

[dependencies]
jammi-ai = { workspace = true, optional = true }
jammi-engine.workspace = true
axum.workspace = true
arrow-flight.workspace = true
datafusion.workspace = true
datafusion-flight-sql-server.workspace = true
tonic.workspace = true
tonic-prost.workspace = true
prost.workspace = true
prost-types.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
uuid.workspace = true
async-trait.workspace = true

[build-dependencies]
tonic-build.workspace = true
tonic-prost-build.workspace = true

[features]
cuda  = ["dep:jammi-ai", "jammi-ai/cuda"]
metal = ["dep:jammi-ai", "jammi-ai/metal"]

[dev-dependencies]
tokio.workspace = true
tower = { workspace = true, features = ["util"] }
reqwest.workspace = true

name: Crates

on:
  push:
    tags: ["v*"]
  # Manual re-run to finish a release whose publish step was interrupted (e.g. a
  # runner ran out of disk mid-publish). Pass the version to (re)publish; the
  # per-crate "already on crates.io" guard skips whatever already landed.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to (re)publish, e.g. 0.13.0. Defaults to the pushed tag."
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify tag matches workspace version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match workspace version $version"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # `jammi-python` is built via maturin, not workspace cargo — its
      # `extension-module` feature is opt-in so the bare workspace test
      # lane would fail to link `-lpython3.x` on the manylinux CI image.
      # The crate is exercised end-to-end by the `Test (Python)` job in
      # `ci.yml` (which also runs `cargo test -p jammi-python` against
      # the venv's interpreter).
      - name: Run tests
        run: cargo test --workspace --exclude jammi-python

  perf-gate:
    name: Performance regression gate (release-blocking)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    # The release tag is the authoritative same-box-ish performance gate: a
    # structural throughput regression (a path that went quadratic, a serialized
    # parallel section, a dropped fast path) SHOULD block a release. Each
    # `*-scale` tier maps its measured-rate-vs-committed-floor verdict (and its
    # determinism-digest check) to the process exit code, so a regression exits
    # non-zero and reds this job — and because `publish` needs it, the crates
    # never ship. This is the gated half of §4.4; the nightly `perf.yml` lane is
    # the non-blocking early-warning half. The documented contract (the verb ×
    # baseline × threshold × reference-box SLO table) is
    # `docs/guide/src/performance-slos.md`.
    env:
      # Pin Rayon to one thread so the measured rate reflects the engine's
      # per-core code path, not the runner's core count — the posture the
      # committed baselines were emitted under.
      RAYON_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build the bench harness (release)
        # The committed baselines are release-profile numbers; the rate gate
        # only means anything against a release build.
        run: cargo build -p jammi-bench --release

      - name: train-scale (fine-tune throughput + OOM control)
        run: ./target/release/jammi-bench train-scale

      - name: graph-train-scale (graph sampler throughput + digest)
        run: ./target/release/jammi-bench graph-train-scale

      - name: context-predictor-scale (predictor train throughput + predict digest)
        run: ./target/release/jammi-bench context-predictor-scale

      - name: model-inference-scale (serving throughput + output digests)
        run: ./target/release/jammi-bench model-inference-scale

      - name: arxiv (held-out ANN-vs-exact recall over the committed corpus)
        run: ./target/release/jammi-bench arxiv

  publish:
    name: Publish to crates.io
    # A release ships only if BOTH the workspace validates AND the performance
    # gate holds — a structural perf regression blocks the tag.
    needs: [validate, perf-gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          # On a tag push, derive the version from the tag (v0.13.0 -> 0.13.0);
          # on a manual dispatch, take it from the input.
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION:-${GITHUB_REF_NAME#v}}"

          # The crates.io sparse index lags `cargo publish` by seconds-to-minutes:
          # after publishing crate X, a dependent crate Y's publish reads the index
          # to resolve `X = "=<version>"` and fails if X's new version isn't listed
          # yet. The presence guard polls the *API* (a different surface) and only
          # protects re-runs; first-run propagation needs an *index* wait. So after
          # each publish, block until the exact name+version appears in the sparse
          # index before moving to the next (dependent) crate — a deterministic
          # signal, not a blind sleep.
          #
          # Index path layout: 1-char names live under `1/`, 2-char under `2/`,
          # 3-char under `3/<c1>/`, 4-plus under `<c1c2>/<c3c4>/`.
          index_dir_prefix() {
            local name="$1"
            case "${#name}" in
              1) printf '1' ;;
              2) printf '2' ;;
              3) printf '3/%s' "${name:0:1}" ;;
              *) printf '%s/%s' "${name:0:2}" "${name:2:2}" ;;
            esac
          }

          wait_for_index() {
            local crate="$1" version="$2"
            local url="https://index.crates.io/$(index_dir_prefix "${crate}")/${crate}"
            local deadline=$(( SECONDS + 300 ))  # bound: 5 minutes, then fail loudly
            echo "Waiting for ${crate} ${version} to appear in the crates.io sparse index (${url})..."
            while (( SECONDS < deadline )); do
              if curl -sf -A "jammi-ai release CI (github.com/f-inverse/jammi-ai)" "${url}" \
                | grep -q "\"vers\":\"${version}\""; then
                echo "${crate} ${version} is visible in the sparse index"
                return 0
              fi
              sleep 5
            done
            echo "::error::${crate} ${version} did not appear in the crates.io sparse index within 5 minutes"
            return 1
          }
          # Publish in topological dependency order. Each entry must come
          # after every crate it depends on, since `cargo publish` resolves
          # workspace deps against crates.io once the path = is stripped:
          #   - jammi-numerics is leaf (no internal deps)
          #   - jammi-db depends on jammi-numerics
          #   - jammi-lora is leaf
          #   - jammi-encoders depends on jammi-lora
          #   - jammi-wire depends on jammi-db, jammi-numerics, jammi-lora
          #   - jammi-admin depends on jammi-wire, jammi-db
          #   - jammi-client depends on jammi-wire, jammi-admin, jammi-db
          #   - jammi-ai depends on jammi-db, jammi-numerics, jammi-lora, jammi-encoders, jammi-wire
          #   - jammi-server depends on jammi-db, jammi-wire, jammi-ai
          #   - jammi-cli depends on jammi-db, jammi-admin
          # The presence guard skips crates that don't exist at this tag's
          # checkout — pre-S2 tags don't have jammi-numerics.
          for crate in jammi-numerics jammi-db jammi-lora jammi-encoders jammi-wire jammi-admin jammi-client jammi-ai jammi-server jammi-cli; do
            if [ ! -f "crates/${crate}/Cargo.toml" ]; then
              echo "${crate} not present at this tag — skipping"
              continue
            fi
            # crates.io's API rejects requests with no User-Agent (403), which a
            # bare `curl -sf` cannot distinguish from "not published" — it would
            # then try to republish an existing crate and fail. Send a UA so the
            # existence check is accurate on a re-run.
            if curl -sf -A "jammi-ai release CI (github.com/f-inverse/jammi-ai)" "https://crates.io/api/v1/crates/${crate}/${VERSION}" >/dev/null; then
              echo "${crate} ${VERSION} already on crates.io — skipping"
            else
              echo "Publishing ${crate} ${VERSION}"
              # --no-verify: the `validate` job above already compiled and tested
              # the whole workspace, so cargo's per-crate pre-publish recompile is
              # redundant — and recompiling the full arrow/candle/datafusion tree
              # once per crate overflows the runner's disk on the last crate.
              cargo publish -p "${crate}" --no-verify
              # Block until this exact version is resolvable by the next crate's
              # publish — only for crates this run actually published (the guard's
              # skip branch needs no wait; it's already in the index).
              wait_for_index "${crate}" "${VERSION}"
            fi
          done

  github-release:
    name: GitHub Release
    needs: publish
    # Only on a tag push — a manual dispatch (used to finish an interrupted
    # publish) has no tag ref to create a release from.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # `release-binaries.yml`'s legs create the release themselves before
      # uploading their assets, so by the time the crates.io publish finishes the
      # release usually already exists. Create it only if missing — otherwise
      # no-op — so whoever wins the race creates it and this job tolerates it.
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes

name: npm

# Publishes @f-inverse/jammi-client (the TypeScript gRPC-web SDK) to npm, in LOCKSTEP with
# the engine: the same `v*` release tag that drives the crates.io / PyPI publish.
# It runs ONLY on a release tag push — never on a PR or a branch push — so a
# merge to `main` cannot publish.
on:
  push:
    tags: ["v*"]
  # Manual re-run to finish a release whose publish step was interrupted. The
  # `npm publish` below is a no-op (skipped) if the version is already on npm.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to (re)publish, e.g. 0.13.0. Defaults to the pushed tag."
        required: false
        type: string

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    permissions:
      # `id-token: write` authenticates the publish via npm OIDC Trusted
      # Publishing (no stored `NPM_TOKEN`) and mints the signed provenance
      # attestation; `contents: read` is the checkout default. The npm package
      # `@f-inverse/jammi-client` registers this repo + workflow as a trusted
      # publisher (the npm analogue of the PyPI/crates.io trusted publishers).
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) auto-auth needs a recent npm; Node 22 ships an
      # older npm. Upgrade so `npm publish` exchanges the GitHub OIDC token for a
      # short-lived publish credential — no long-lived secret to expire.
      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match @f-inverse/jammi-client version $version"
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Build (generate + tsc)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test (hermetic)
        run: npm run test

      # Publishes via OIDC Trusted Publishing — no `NODE_AUTH_TOKEN` / `NPM_TOKEN`.
      # `npm publish` detects the GitHub Actions OIDC environment (`id-token:
      # write`) and exchanges it for a short-lived publish credential, and emits
      # provenance automatically. Requires the npm package to register this repo
      # + workflow as a trusted publisher.
      - name: Publish
        run: |
          set -euo pipefail
          # On a tag push, derive the version from the tag (v0.13.0 -> 0.13.0);
          # on a manual dispatch, take it from the input.
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION:-${GITHUB_REF_NAME#v}}"
          # Skip if this version is already on npm (idempotent re-run); `npm view`
          # exits non-zero when the exact version does not exist yet.
          if npm view "@f-inverse/jammi-client@${VERSION}" version >/dev/null 2>&1; then
            echo "@f-inverse/jammi-client ${VERSION} already on npm — skipping"
          else
            echo "Publishing @f-inverse/jammi-client ${VERSION}"
            npm publish --provenance --access public
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (hermetic)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Compile-check live tests
        run: cargo test --workspace --features live-hub-tests --no-run

      - name: Run tests
        run: cargo test --workspace

  test-live:
    name: Test (live)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: test
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Run live tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: cargo test --workspace --features live-hub-tests

  test-pg:
    name: Test (Postgres)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jammi
          POSTGRES_PASSWORD: jammi
          POSTGRES_DB: jammi_test
        options: >-
          --health-cmd "pg_isready -U jammi -d jammi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Run Postgres-gated tests
        env:
          # Service container is reachable at `postgres` from the job container
          # (same Docker network); the catalog connects via sqlx::PgPool.
          JAMMI_TEST_PG_URL: postgres://jammi:jammi@postgres:5432/jammi_test
        # Tests share one catalog DB and serialise migrate() ledger writes.
        # `--test-threads=1` keeps that contract; the suite is small.
        run: |
          cargo test -p jammi-engine --features live-postgres-tests --test it -- --test-threads=1

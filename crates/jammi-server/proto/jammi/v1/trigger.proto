syntax = "proto3";

package jammi.v1.trigger;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// TriggerService — primitive pub/sub over Arrow record batches.
//
// Verb vocabulary is closed: RegisterTopic, DropTopic, Publish, Subscribe,
// ListTopics. No domain-shaped verbs (no Discover, no Ingest*, no Run*). See
// ADR-01 §3.4.
service TriggerService {
  // Register a topic (provisions its backing table) for the trigger stream.
  // Peer of the abstraction's `register_topic`. The schema is the contract
  // every published batch must satisfy.
  rpc RegisterTopic(RegisterTopicRequest) returns (RegisterTopicResponse);

  // Drop a topic and its backing table. Peer of the abstraction's
  // `drop_topic`. `if_exists` makes a missing topic a no-op rather than a
  // NotFound error.
  rpc DropTopic(DropTopicRequest) returns (google.protobuf.Empty);

  // Publish a single batch to a topic. Unary RPC.
  rpc Publish(PublishRequest) returns (PublishResponse);

  // Subscribe to a topic with an optional SQL predicate filter applied
  // server-side. Server-streaming RPC; the stream stays open until the
  // client cancels or the deadline expires.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribedBatch);

  // List topics registered in the catalog. Pagination follows AIP-132.
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
}

message RegisterTopicRequest {
  // Fully-qualified catalog name for the topic.
  string name = 1;
  // Arrow schema for batch payloads, encoded as an Arrow IPC schema message
  // (the same self-describing IPC framing the batch payloads use).
  bytes schema = 2;
  // Broker-driver-specific configuration (retention, replication, etc.),
  // opaque to the engine. Empty == no driver metadata.
  map<string, string> broker_metadata = 3;
}

message RegisterTopicResponse {
  // The engine-minted topic id (UUID string).
  string topic_id = 1;
}

message DropTopicRequest {
  string name = 1;
  // When true, a missing topic is a no-op instead of a NotFound error.
  bool if_exists = 2;
}

// Topic identifier. Topics are catalog-registered (Phase 4); the name is
// a fully-qualified catalog path (e.g. "default.events.changes"). The
// engine does not interpret the path beyond catalog lookup.
message TopicName {
  string name = 1;
}

// Arrow record batch encoded as Flight IPC payload, mirroring
// arrow_flight::FlightData (data_header + data_body are both bytes).
message ArrowBatch {
  // IPC message header (Schema or RecordBatch) per Arrow's Message.fbs.
  bytes data_header = 1;
  // The actual batch of Arrow data (FlightData::data_body convention).
  bytes data_body = 2;
  // Optional application metadata; not interpreted by the engine.
  bytes app_metadata = 3;
}

message PublishRequest {
  TopicName topic = 1;
  ArrowBatch batch = 2;
  // Optional tenant scope override; if unset, the session's tenant
  // (set via SessionService.SetTenant) applies. See ADR-00 for TenantId.
  string tenant_id = 3;
}

message PublishResponse {
  // Server-assigned monotonically increasing offset within the topic.
  uint64 offset = 1;
  google.protobuf.Timestamp committed_at = 2;
}

message SubscribeRequest {
  TopicName topic = 1;
  // SQL predicate evaluated server-side against the batch schema.
  // Empty string == no filter.
  string predicate = 2;
  // Optional starting offset; 0 == from the earliest retained batch,
  // unset == from "now" (only future batches).
  optional uint64 from_offset = 3;
  // Optional tenant scope; same semantics as PublishRequest.tenant_id.
  string tenant_id = 4;
}

message SubscribedBatch {
  uint64 offset = 1;
  google.protobuf.Timestamp produced_at = 2;
  ArrowBatch batch = 3;
}

message ListTopicsRequest {
  // AIP-132 pagination.
  int32 page_size = 1;
  string page_token = 2;
  // Optional tenant scope filter.
  string tenant_id = 3;
}

message ListTopicsResponse {
  repeated TopicName topics = 1;
  string next_page_token = 2;
}

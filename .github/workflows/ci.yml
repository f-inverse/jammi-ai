name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (hermetic)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      # `jammi-python` is a PyO3 cdylib whose `extension-module` feature is
      # opt-in (activated by maturin via pyproject.toml). With the feature
      # off, pyo3 emits `-lpython3.x` and the cdylib + tests/it.rs binary
      # both need `libpython` on the linker search path — which the
      # manylinux CI image does not provide outside a maturin-managed
      # build. Excluding it from the workspace test lane matches the
      # existing CLAUDE.md guidance ("build it via maturin, not
      # `cargo build --workspace`") and keeps this lane hermetic; the
      # crate is exercised end-to-end by the `Test (Python)` job below,
      # which also runs `cargo test -p jammi-python` against the venv's
      # interpreter to cover the Rust integration test.
      - name: Run tests
        run: cargo test --workspace --exclude jammi-python

  # The gated-lane compile-checks live in their OWN job, not in `test` above.
  # Each `--no-run` builds a full-workspace test-binary graph; accumulating all
  # of them plus the run-tests graph in one job's `target/` exhausted the
  # runner's disk at link time (`mold: … Disk full?` linking the jammi-server
  # `it` binary). One large graph per job keeps every link within the disk
  # budget. These only compile-check — the live runs are gated elsewhere.
  compile-check-gated:
    name: Compile-check (gated lanes)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      # Live (hub) tests reach the network, so they only compile here; the live
      # run is gated behind `live-hub-tests`. Compile-checking guards bit-rot.
      - name: Compile-check live tests
        run: cargo test --workspace --exclude jammi-python --features live-hub-tests --no-run

      # The gated GPU-capability suite needs a CUDA build and a real GPU, so it
      # cannot run on this CPU runner — like the distributed lane, compile-check
      # it here so it can't bit-rot. The live run is a GPU-host (A10G) gate: see
      # `cargo test -p jammi-ai --features cuda,live-gpu-tests gpu_capability`.
      # Compile-checked without `cuda` (the suite is feature-gated config only;
      # the CUDA symbols it drives are cfg-gated inside the engine), so this
      # stays a CPU-runner step.
      - name: Compile-check GPU-capability suite
        run: cargo test -p jammi-ai --features live-gpu-tests --test gpu_capability --no-run

  test-live:
    name: Test (live)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: test
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Run live tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Same `jammi-python` exclusion as the hermetic lane: the cdylib
        # plus integration test need libpython on the linker path, which
        # only the maturin-managed build (Test (Python) job) provides.
        run: cargo test --workspace --exclude jammi-python --features live-hub-tests

  test-clients:
    name: Test (wire / admin / client)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      # The candle-free client substrate: the wire transport (`jammi-wire`,
      # holding the generated stubs, the proto↔domain converters, and the moved
      # request / eval / fine-tune vocabulary), the control-plane client
      # (`jammi-admin`), and the data-plane client (`jammi-client`). The moved
      # wire-converter + config-round-trip unit tests live here, so run their
      # lints + tests deterministically in their own right.
      - name: Clippy (wire / admin / client)
        run: cargo clippy -p jammi-wire -p jammi-admin -p jammi-client --all-targets -- -D warnings

      - name: Test (wire / admin / client)
        run: cargo test -p jammi-wire -p jammi-admin -p jammi-client

      # The client substrate must stay candle-free — NO candle / hf-hub /
      # symphonia / tokenizers ML stack. The workspace build feature-unifies
      # `local` on via jammi-server / jammi-python, so `cargo tree` would falsely
      # flag candle; the real per-package build set is what `cargo build -p X`
      # compiles, so the guard inspects the compiler-artifact stream of the
      # actual isolated build.
      - name: Assert the client substrate pulls no ML deps
        run: |
          cargo build -p jammi-wire -p jammi-admin -p jammi-client --message-format=json \
            | grep '"reason":"compiler-artifact"' \
            | grep -iE '"name":"(candle[^"]*|hf-hub|hf_hub|symphonia|tokenizers)"' \
            && { echo "::error::the client substrate compiled an embedded-engine ML dep — the candle-free boundary regressed"; exit 1; } \
            || echo "wire / admin / client build set is candle-free"

      # The `jammi` CLI is a strict control-plane client: it depends on
      # `jammi-admin`, NOT `jammi-ai`, so it must stay candle-free AND carry no
      # `jammi-ai` edge at all. The workspace build feature-unifies `local` on
      # via jammi-server / jammi-python, so this isolated `-p jammi-cli` lane is
      # the only place the strict client is exercised — without it a re-coupling
      # of the engine into the CLI would compile everywhere else and regress only
      # here.
      - name: Assert the standalone CLI build pulls no ML deps and no jammi-ai
        run: |
          ARTIFACTS=$(cargo build -p jammi-cli --message-format=json \
            | grep '"reason":"compiler-artifact"' \
            | grep -oE '"name":"[^"]*"')
          echo "$ARTIFACTS" | grep -iE '"name":"(candle[^"]*|hf-hub|hf_hub|symphonia|tokenizers)"' \
            && { echo "::error::the jammi CLI compiled an embedded-engine ML dep — the strict-client boundary regressed"; exit 1; } \
            || echo "jammi-cli build set is candle-free"
          echo "$ARTIFACTS" | grep -iE '"name":"jammi[-_]ai"' \
            && { echo "::error::the jammi CLI compiled jammi-ai — the strict-client boundary regressed"; exit 1; } \
            || echo "jammi-cli build set carries no jammi-ai edge"

  dep-direction:
    name: Guard (engine dep-direction)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      # The open-core boundary is one-way: a consumer may depend on Jammi;
      # Jammi depends on no consumer. This guard walks the resolved
      # normal-dependency closure of the shippable OSS crates (the workspace
      # default-members) and fails, naming the offender, if any crate is from
      # an enterprise namespace or from a non-crates.io source (git / private
      # registry). It reads `cargo metadata`'s resolved graph — the source of
      # truth — so a transitive dep cannot slip past a text grep of Cargo.toml.
      - name: Assert no proprietary crate in the OSS engine dep tree
        run: cargo metadata --format-version 1 --locked | python3 ci/scripts/check_dep_direction.py

  oss-only-build:
    name: Guard (OSS-only build)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      # This guard's signal is HERMETICITY, not re-linking code the test lane
      # already compiles. No private registry or source is configured, and
      # `--locked` forbids resolving any crate not already in the committed
      # Cargo.lock — so a green build proves the OSS edition is self-contained
      # and its lockfile holds zero proprietary entries. `jammi-python` (a PyO3
      # cdylib built via maturin, not `cargo build --workspace`) is excluded to
      # match the existing build/test/docs lanes.
      - name: Build OSS workspace hermetically with no private source
        run: cargo build --workspace --exclude jammi-python --locked

  ts-client:
    name: TS client (@f-inverse/jammi-client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # `@f-inverse/jammi-client` is generated from the canonical proto at
      # `crates/jammi-wire/proto` by `buf generate` (run inside `npm run build`),
      # then type-checked and smoke-tested. Running it on every PR catches a
      # proto change that breaks TS codegen — or a regression in the thin
      # hand-written wrapper — here, not only at the release-tag publish in
      # `npm.yml`. Plain ubuntu (not the Rust CI container): this lane needs
      # Node, not cargo.
      - name: Install
        run: npm ci

      - name: Build (generate + tsc)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test (hermetic)
        run: npm run test

  py-client:
    name: Python client (jammi-client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `jammi-client` is the pure-Python (no-Rust) deploy half: generated from
      # the canonical `crates/jammi-wire/proto` by `make generate`, then installed
      # and tested. Running it on every PR catches a proto change that breaks the
      # Python codegen — or a regression in the hand-written `connect` /
      # `RemoteDatabase` seam — here, not only at the `py-v*` publish in
      # `pypi-client.yml`. Plain ubuntu (not the Rust CI container): this lane
      # needs Python, not cargo.
      - name: Install (with dev extra) + generate stubs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          make generate

      - name: Test (hermetic)
        run: make test

  test-broker:
    name: Test (NATS JetStream)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install and start nats-server (with JetStream)
        # GHA `services:` cannot override the upstream image's CMD to pass
        # `-js`, so the broker driver's JetStream API isn't available with
        # the default `nats:2.10` entrypoint. Running the official tarball
        # release directly lets the job pass `-js -m 8222` and own the
        # process lifetime explicitly.
        run: |
          NATS_VERSION=v2.10.21
          NATS_TGZ="nats-server-${NATS_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "https://github.com/nats-io/nats-server/releases/download/${NATS_VERSION}/${NATS_TGZ}" -o /tmp/nats.tar.gz
          tar -xzf /tmp/nats.tar.gz -C /tmp
          /tmp/nats-server-${NATS_VERSION}-linux-amd64/nats-server -js -m 8222 -p 4222 >/tmp/nats.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8222/healthz >/dev/null 2>&1; then
              echo "nats-server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8222/healthz

      - name: Run JetStream broker tests
        env:
          JAMMI_TEST_NATS_URL: nats://127.0.0.1:4222
        # JetStream streams are global; serialise so concurrent tests do not
        # collide on freshly minted topic ids while one of them is still
        # tearing down.
        run: |
          cargo test -p jammi-db --features live-broker-tests --test it -- --test-threads=1

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build wheel with maturin develop
        # The CI base image ships maturin + a python3 toolchain; use a
        # venv to avoid polluting the system site-packages and to make
        # `python` resolve to the venv's interpreter for pytest.
        #
        # The embed wheel hard-deps `jammi-client` (the remote arm, by
        # composition). It is not on PyPI for an unreleased commit, so install
        # it from the in-repo source first — `pip install -e` with the dev
        # extra (which carries the pinned `grpcio-tools` generator and the
        # client's real grpcio/protobuf floors), then generate its proto
        # stubs — before `maturin develop` resolves the dep. This is also
        # exactly what makes the conformance test (`jammi_ai.connect`'s
        # remote IS `jammi_client.RemoteDatabase`) runnable in this lane.
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest
          pip install -e 'clients/python[dev]'
          make -C clients/python generate
          maturin develop --release

      - name: Run pytest
        run: |
          . .venv/bin/activate
          pytest crates/jammi-python/tests -v

      - name: Run UAT shape-B/C Python scripts
        run: |
          . .venv/bin/activate
          for script in tests/uat/shape_b_*.py tests/uat/shape_c_*.py; do
            echo "=== $script ==="
            python3 "$script"
          done

  test-pg:
    name: Test (Postgres)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/f-inverse/jammi-ai-ci:latest
    needs: check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jammi
          POSTGRES_PASSWORD: jammi
          POSTGRES_DB: jammi_test
        options: >-
          --health-cmd "pg_isready -U jammi -d jammi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Run Postgres-gated tests
        env:
          # Service container is reachable at `postgres` from the job container
          # (same Docker network); the catalog connects via sqlx::PgPool.
          JAMMI_TEST_PG_URL: postgres://jammi:jammi@postgres:5432/jammi_test
        # Tests share one catalog DB and serialise migrate() ledger writes.
        # `--test-threads=1` keeps that contract; the suite is small.
        run: |
          cargo test -p jammi-db --features live-postgres-tests --test it -- --test-threads=1

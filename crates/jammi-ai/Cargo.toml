[package]
name = "jammi-ai"
description = "Embeddable AI engine for inference, embeddings, vector search, and fine-tuning"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

[dependencies]
jammi-db.workspace = true
jammi-numerics.workspace = true
# `jammi-lora` is pulled for its candle-free config vocabulary (the `BackboneDtype`
# / `LoraInitMode` fields of `FineTuneConfig`, on the wire surface) at all times
# â€” the workspace pins it `default-features = false`. Its candle stack is opt-in:
# the `local` feature turns `jammi-lora/candle` back on for the embedded fine-tune
# engine.
jammi-lora.workspace = true

# â”€â”€ The embedded ML engine. Every dep below pulls a heavy ML / decode stack and
# is needed only by the in-process engine (the `model` / `inference` / `session`
# / engine-`fine_tune` / `eval::runner` modules). They are gated behind the
# default-on `local` feature so a remote-only `wire` build pulls none of them and
# stays a thin wire-speaker. A default / embedded / PyO3 build keeps them all.
jammi-encoders = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
hf-hub = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }
# Lexical (BM25) retrieval sidecar â€” the tantivy inverted index, peer of the
# USearch ANN sidecar. Embedded-engine-only, so it rides `local`.
tantivy = { workspace = true, optional = true }
# Image processing
image = { workspace = true, optional = true }
# Audio decode/demux for the audio-embedding path (bytes-in: WAV/FLAC/MP3/Ogg)
symphonia = { workspace = true, optional = true }
# Gzip decompression for OpenCLIP BPE vocab (bpe_simple_vocab_16e6.txt.gz)
flate2 = { workspace = true, optional = true }
# HTTP backend
reqwest = { workspace = true, optional = true }
# `#[async_trait]` for the `annotate` table function's `TableProvider` impl
# (the in-process compound-query surface); only the `local` engine builds it.
async-trait = { workspace = true, optional = true }
# The embedded fine-tune engine trains into a worker-private tempdir before
# publishing the final artifact to the object store; only the `local` engine
# builds that path.
tempfile = { version = "3", optional = true }
# `Bytes` for handing trained-artifact files to the object-store `put_artifact`
# API; only the `local` engine's fine-tune worker uses it.
bytes = { version = "1", optional = true }

datafusion.workspace = true
arrow.workspace = true
arrow-schema.workspace = true
arrow-array.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tokio.workspace = true
thiserror.workspace = true
uuid.workspace = true
chrono.workspace = true

# gRPC wire surface (default-off `wire` feature). These pull the transport
# stack only when a consumer that speaks gRPC â€” `jammi-server`, a future
# `RemoteSession` â€” opts in; a default / embedded / PyO3 build pulls none of
# them, keeping the embeddable engine tonic/prost-free.
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
prost-types = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }
arrow-ipc = { workspace = true, optional = true }
# Flight SQL client. The remote `Session::sql` rides the Flight SQL lane (per
# ADR-01 Â§3.2 Flight SQL carries query/result), so a `RemoteSession` speaks
# Flight SQL over the same tonic channel its typed-RPC verbs use. Wire-only;
# pulls no candle.
arrow-flight = { workspace = true, optional = true }

[build-dependencies]
# Built only under the `wire` feature; `build.rs` returns early without
# `CARGO_FEATURE_WIRE`, so a default build neither links nor runs these.
tonic-build = { workspace = true, optional = true }
tonic-prost-build = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3"
tokio.workspace = true
parquet.workspace = true
wiremock = "0.6"
serial_test = "3"
jammi-test-utils.workspace = true
# SIGKILL of a spawned worker process in the distributed-validation harness
# (the kill-9 reclaim / artifact-crash-window properties). Test-only.
libc.workspace = true
# Standard-normal quantiles for generating calibrated/ensemble fixtures in the
# calibration-eval unit tests (spec R2). Test-only â€” the engine routes all
# production calibration math through `jammi-numerics`, never `statrs` directly.
statrs.workspace = true
# Synthetic exchangeable data generators for the conformal coverage tests.
rand.workspace = true
rand_distr.workspace = true

[features]
default = ["local"]
# The embedded in-process engine: model loading + inference + fine-tune training
# + embedding/search pipelines, and the candle / hf-hub / symphonia / tokenizers
# / image stack they run on. Default-on, so a plain / embedded / PyO3 build is
# byte-unchanged. Turning it OFF (with `wire` ON) yields a thin remote-only client
# â€” `RemoteSession` + `Session::Remote` + `Jammi::open(Target::Remote)` â€” that
# pulls no ML stack. The `Session` / `Target` enums gain their `Local` arm only
# under this feature, mirroring how `Remote` rides `wire`: the buildable surface
# equals the runtime capability.
local = [
    "dep:jammi-encoders",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:hf-hub",
    "dep:tokenizers",
    "dep:tantivy",
    "dep:image",
    "dep:symphonia",
    "dep:flate2",
    "dep:reqwest",
    "dep:async-trait",
    "dep:tempfile",
    "dep:bytes",
    "jammi-lora/candle",
]
live-hub-tests = []
# A gated, multi-process distributed-validation lane: spawns N `jammi-server`
# worker processes against a shared Postgres catalog + shared object store
# (MinIO) and asserts the durable-worker fleet-safety properties (exactly-one
# claim, kill-9 reclaim, the artifact crash-window on real object storage,
# cross-tenant isolation) under real distribution. Off by default â€” the harness
# needs `JAMMI_TEST_PG_URL` + a MinIO S3 endpoint and is not part of the hermetic
# `cargo test` lane. The `it` engine suite is still required for the shared
# session/fixture machinery, so this feature implies `local`; it also implies
# `jammi-db/storage-s3` because the harness session reads the worker-published
# adapter back from the shared MinIO bucket (the cross-host artifact round-trip),
# which needs the S3 object-store driver compiled into the test binary.
live-distributed-tests = ["local", "jammi-db/storage-s3"]
# CUDA / Metal acceleration of the embedded engine â€” only meaningful with `local`.
cuda = ["local", "candle-core/cuda", "candle-nn/cuda"]
metal = ["local", "candle-core/metal", "candle-nn/metal"]
# The gRPC wire surface: generated tonic stubs (build.rs codegen) plus the
# protoâ†”domain conversions in `src/wire`. Default-off so the embeddable engine
# pulls no transport stack; `jammi-server` and a future `RemoteSession` enable
# it. Pulls the tonic/prost runtime deps and the tonic build-deps that drive
# `build.rs`.
wire = [
    "dep:tonic",
    "dep:tonic-prost",
    "dep:prost",
    "dep:prost-types",
    "dep:tokio-stream",
    "dep:arrow-ipc",
    "dep:arrow-flight",
    "dep:tonic-build",
    "dep:tonic-prost-build",
]

# The `it` integration suite drives the embedded engine end-to-end (model loading,
# inference, fine-tune, search), so it requires the `local` feature. Declaring the
# requirement here lets `--all-targets` skip it cleanly in the thin `wire`-only
# build rather than fail to compile an engine test with no engine. The wire
# protoâ†”domain conversions keep their own in-lib `#[cfg(test)]` unit tests, which
# the thin build still compiles and runs.
[[test]]
name = "it"
path = "tests/it/main.rs"
required-features = ["local"]

# The multi-process distributed-validation harness. Its own target (not part of
# the hermetic `it` suite) so it compiles and runs only under
# `live-distributed-tests`, and so the gated CI lane can target it by name with
# `--test distributed`. Spawns `jammi-server` worker processes against a shared
# Postgres + MinIO; never compiled or run on the default `cargo test` lane.
[[test]]
name = "distributed"
path = "tests/distributed/main.rs"
required-features = ["live-distributed-tests"]
